<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Relato Pro - V3.1 (Agrupamento Ativo)</title>

    <style>
        :root {
            --bg-body: #f4f6f8;
            --bg-container: white;
            --text-color: #333;
            --item-bg: #f1f1f1;
            --border-color: #ccc;
            --group-bg: #fafafa;
            --primary-color: #007bff;
        }

        body.dark-mode {
            --bg-body: #121212;
            --bg-container: #1e1e1e;
            --text-color: #e0e0e0;
            --item-bg: #2d2d2d;
            --border-color: #444;
            --group-bg: #252525;
        }

        body {
            font-family: Arial, sans-serif;
            background: var(--bg-body);
            color: var(--text-color);
            padding: 40px 20px;
            margin: 0;
            transition: 0.3s;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: var(--bg-container);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .controles-topo {
            position: fixed;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            z-index: 1000;
        }

        #btnNightMode {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: var(--bg-container);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .seletor-cor {
            width: 30px;
            height: 30px;
            padding: 0;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            overflow: hidden;
        }

        .grupo-adicao {
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 8px;
            background: var(--group-bg);
            margin-bottom: 20px;
        }

        .titulo-container {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px dashed var(--border-color);
            position: relative;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: var(--bg-container);
            color: var(--text-color);
            box-sizing: border-box;
        }

        .input-emoji-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        #titulo { padding-right: 40px; }
        .btn-emoji-open {
            position: absolute;
            right: 5px;
            top: 55%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            padding: 0;
            z-index: 5;
        }
        .painel-emotes {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            width: 280px;
            max-height: 200px;
            overflow-y: auto;
            background: var(--bg-container);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            z-index: 2000;
            padding: 10px;
            grid-template-columns: repeat(8, 1fr);
            gap: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .painel-emotes span {
            cursor: pointer;
            font-size: 20px;
            text-align: center;
            padding: 3px;
            border-radius: 4px;
        }
        .painel-emotes span:hover { background: rgba(0,0,0,0.1); }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: var(--primary-color);
            color: white;
            font-weight: bold;
            transition: filter 0.2s;
        }

        button:hover { filter: brightness(0.9); }

        .item-bloco {
            background: var(--item-bg);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid var(--primary-color);
            position: relative;
        }

        .cabecalho-bloco {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.05);
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .titulo-texto {
            text-transform: uppercase;
            font-size: 0.85em;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .controles-ordem-bloco {
            display: flex;
            gap: 4px;
        }

        .btn-ordem {
            background: #6c757d;
            padding: 2px 8px;
            font-size: 14px;
        }

        .linha-reordenavel {
            background: var(--bg-container);
            margin-top: 8px;
            padding: 10px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: grab;
            border: 1px solid transparent;
        }

        .drag-over-bloco {
            background: rgba(0, 123, 255, 0.15) !important;
            outline: 2px dashed var(--primary-color);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--bg-container);
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
        }

        .tag-sub {
            display: inline-flex;
            align-items: center;
            background: var(--primary-color);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin: 2px;
        }

        .btn-acoes { display: flex; gap: 5px; }
        .btn-delete { background: #dc3545; padding: 4px 8px; font-size: 12px; }
        .btn-edit { background: #6c757d; padding: 4px 8px; font-size: 12px; }

        .output {
            margin-top: 10px;
            background: #111;
            color: #0f0;
            padding: 15px;
            border-radius: 8px;
            white-space: pre-wrap;
            font-family: monospace;
        }
    </style>
</head>

<body>

<div class="modal-overlay" id="modalEdicao">
    <div class="modal-content">
        <h3>Editar Item</h3>
        <input type="text" id="editDesc" placeholder="Descrição">
        <input type="text" id="editSubs" placeholder="Subdescrições (vírgula)" style="margin-top:10px">
        <div style="display:flex; gap:10px; margin-top:20px">
            <button style="background:#6c757d; flex:1" onclick="fecharModal()">Cancelar</button>
            <button style="flex:2" id="btnSalvarModal">Salvar</button>
        </div>
    </div>
</div>

<div class="controles-topo">
    <input type="color" id="corTema" class="seletor-cor" onchange="mudarCorTema(this.value)">
    <button id="btnNightMode" onclick="toggleNightMode()">🌓</button>
</div>

<div class="container">
    <h2>Gerador de Relato</h2>

    <input type="date" id="data" style="margin-bottom: 20px;">

    <div class="grupo-adicao">
        <div class="titulo-container">
            <label>Título da Seção</label>
            <div class="input-emoji-wrapper">
                <input type="text" id="titulo" placeholder="Ex: Atividades do Dia" oninput="salvarProgresso()">
                <button type="button" class="btn-emoji-open" onclick="toggleEmotes()">😀</button>
                <div id="painelEmotes" class="painel-emotes"></div>
            </div>
        </div>
        <div>
            <label>Descrição</label>
            <input type="text" id="descricao" placeholder="Descrição do item" oninput="salvarProgresso()">
        </div>
        <div style="display:flex; gap:10px; margin-top:10px">
            <input type="text" id="subInput" placeholder="Sub item(caso houver)">
            <button type="button" onclick="addTag()">+</button>
        </div>
        <div id="containerTags" style="margin-top:10px"></div>
        <button onclick="adicionarItem()" style="width:100%; margin-top:15px">Adicionar à Lista</button>
    </div>

    <div style="margin-top:20px">
        <h3>Estrutura do Relato</h3>
        <p style="font-size: 0.8em; opacity: 0.7;">• Itens com mesma descrição serão agrupados automaticamente.<br>• Use as setas para mover seções.</p>
        <div id="lista"></div>
    </div>

    <div style="display: flex; gap: 10px; margin: 20px 0;">
        <button onclick="gerarTexto()" style="flex: 3;">Gerar Texto Final</button>
        <button onclick="limparTudo()" style="flex: 1; background: #6c757d;">Limpar</button>
    </div>
    <div style="display:flex; justify-content: space-between; align-items:center">
        <h3>Resultado</h3>
        <button onclick="copiarTexto()">Copiar</button>
    </div>
    <div class="output" id="resultado"></div>
</div>

<script>
let dados = new Map();
let subdescricoesTemporarias = [];
let dragSource = null;
const emojis = ["☀️","🌙","🍅","🏎️","🚙","🍪","👩‍⚕️","🌊","🥬","💸","💰","😀","😃","😄","😁","😆","😅","😂","🤣","😊","😉","😍","😘","😋","🤔","🤫","😐","🙄","😬","😔","😴","😎","🤓","🧐","😮","🥺","😢","😭","😱","😡","🤡","💩","👻","👍","👎","👏","🙏","💪","❤️","🔥","✨","⭐","⚡","⚽","🏀"];
const painel = document.getElementById('painelEmotes');

emojis.forEach(e => {
    const span = document.createElement('span');
    span.textContent = e;
    span.onclick = () => {
        const input = document.getElementById('titulo');
        input.value += e;
        input.focus();
    };
    painel.appendChild(span);
});

function salvarProgresso() {
    const estado = {
        data: document.getElementById('data').value,
        titulo: document.getElementById('titulo').value,
        descricao: document.getElementById('descricao').value,
        subdescricoesTemporarias: subdescricoesTemporarias,
        dados: Array.from(dados.entries()) // Converte Map para Array para JSON
    };
    localStorage.setItem('relato_pro_backup', JSON.stringify(estado));
}

function carregarProgresso() {
    const salvo = localStorage.getItem('relato_pro_backup');
    if (salvo) {
        const estado = JSON.parse(salvo);
        
        // Restaura campos simples
        if (estado.data) document.getElementById('data').value = estado.data;
        document.getElementById('titulo').value = estado.titulo || "";
        document.getElementById('descricao').value = estado.descricao || "";
        
        // Restaura listas e Map
        subdescricoesTemporarias = estado.subdescricoesTemporarias || [];
        if (estado.dados) {
            dados = new Map(estado.dados);
        }
        
        renderTags();
        renderLista();
    }
}

function limparProgresso() {
    localStorage.removeItem('relato_pro_backup');
}

// Adiciona listener para a data
document.getElementById('data').onchange = salvarProgresso;

function toggleEmotes() {
    painel.style.display = painel.style.display === 'grid' ? 'none' : 'grid';
}

document.addEventListener('click', (e) => {
    if (!e.target.closest('.input-emoji-wrapper')) painel.style.display = 'none';
});

document.getElementById('subInput').addEventListener('keydown', e => { 
    if(e.key === 'Enter') { e.preventDefault(); addTag(); }
});

function addTag() {
    let val = document.getElementById('subInput').value.trim();
    if (val) { subdescricoesTemporarias.push(val); renderTags(); salvarProgresso(); }
    document.getElementById('subInput').value = "";
}

function renderTags() {
    document.getElementById('containerTags').innerHTML = subdescricoesTemporarias.map((s, i) => 
        `<span class="tag-sub">${s} <span onclick="removeTag(${i})" style="cursor:pointer">&times;</span></span>`
    ).join('');
}

function removeTag(i) { subdescricoesTemporarias.splice(i, 1); renderTags(); salvarProgresso(); }

function adicionarItem() {
    let titulo = document.getElementById("titulo").value.trim();
    let descricao = document.getElementById("descricao").value.trim();
    
    if (!titulo || !descricao) return;
    
    // Garante que a seção existe
    if (!dados.has(titulo)) dados.set(titulo, []);
    
    let itensDaSecao = dados.get(titulo);
    
    // Lógica de AGRUPAMENTO: Procura se a descrição já existe nesta seção
    let itemExistente = itensDaSecao.find(i => i.descricao.toLowerCase() === descricao.toLowerCase());

    if (itemExistente) {
        // Se já existe, apenas anexa as subdescrições novas
        subdescricoesTemporarias.forEach(sub => {
            if (!itemExistente.subdescricoes.includes(sub)) {
                itemExistente.subdescricoes.push(sub);
            }
        });
    } else {
        // Se é novo, adiciona normalmente
        itensDaSecao.push({ 
            descricao, 
            subdescricoes: [...subdescricoesTemporarias] 
        });
    }
    
    subdescricoesTemporarias = [];
    renderTags();
    document.getElementById("descricao").value = "";
    renderLista();
    salvarProgresso();
}

function moverBloco(titulo, direcao) {
    const entries = Array.from(dados.entries());
    const index = entries.findIndex(e => e[0] === titulo);
    const novoIndex = index + direcao;

    if (novoIndex >= 0 && novoIndex < entries.length) {
        const temp = entries[index];
        entries[index] = entries[novoIndex];
        entries[novoIndex] = temp;
        dados = new Map(entries);
        renderLista();
        salvarProgresso();
    }
}

function renderLista() {
    let html = "";
    const entries = Array.from(dados.entries());
    
    entries.forEach(([titulo, itens], idx) => {
        html += `
        <div class="item-bloco" 
             ondragover="handleDragOver(event)" 
             ondragleave="handleDragLeave(event)"
             ondrop="handleDrop(event, '${titulo}')">
            
            <div class="cabecalho-bloco">
                <span class="titulo-texto">${titulo}</span>
                <div class="controles-ordem-bloco">
                    <button class="btn-ordem" onclick="moverBloco('${titulo}', -1)" ${idx === 0 ? 'disabled style="opacity:0.3"' : ''}>▲</button>
                    <button class="btn-ordem" onclick="moverBloco('${titulo}', 1)" ${idx === entries.length - 1 ? 'disabled style="opacity:0.3"' : ''}>▼</button>
                </div>
            </div>
            
            ${itens.map((i, index) => `
                <div class="linha-reordenavel" draggable="true" ondragstart="dragItem(event, '${titulo}', ${index})">
                    <div style="pointer-events:none">
                        - ${i.descricao}
                        ${i.subdescricoes.map(s => `<div style="margin-left:20px; font-size:0.85em; opacity:0.7">↳ ${s}</div>`).join('')}
                    </div>
                    <div class="btn-acoes">
                        <button class="btn-edit" onclick="abrirModal('${titulo}', ${index})">✎</button>
                        <button class="btn-delete" onclick="excluirItem('${titulo}', ${index})">🗑</button>
                    </div>
                </div>
            `).join('')}
        </div>`;
    });
    document.getElementById("lista").innerHTML = html || "<p style='opacity:0.5'>Adicione itens acima...</p>";
}

function dragItem(ev, titulo, index) { dragSource = { titulo, index }; }
function handleDragOver(ev) { ev.preventDefault(); ev.currentTarget.classList.add('drag-over-bloco'); }
function handleDragLeave(ev) { ev.currentTarget.classList.remove('drag-over-bloco'); }

function handleDrop(ev, tituloDestino) {
    ev.preventDefault();
    ev.currentTarget.classList.remove('drag-over-bloco');
    if (!dragSource) return;

    const sourceItens = dados.get(dragSource.titulo);
    const itemSendoMovido = sourceItens[dragSource.index];

    // Se estiver movendo para o mesmo título, não precisa agrupar, apenas reordenar (opcional)
    if (dragSource.titulo === tituloDestino) {
        // Logica simples de reordenação se necessário, aqui apenas mantemos como está
        dragSource = null;
        return;
    }

    // Ao mover para outra seção, verifica se lá já existe a mesma descrição para agrupar
    if (!dados.has(tituloDestino)) dados.set(tituloDestino, []);
    let destinoItens = dados.get(tituloDestino);
    let duplicataDestino = destinoItens.find(i => i.descricao.toLowerCase() === itemSendoMovido.descricao.toLowerCase());

    if (duplicataDestino) {
        itemSendoMovido.subdescricoes.forEach(s => {
            if (!duplicataDestino.subdescricoes.includes(s)) duplicataDestino.subdescricoes.push(s);
        });
        sourceItens.splice(dragSource.index, 1);
    } else {
        destinoItens.push(sourceItens.splice(dragSource.index, 1)[0]);
    }

    if (sourceItens.length === 0) dados.delete(dragSource.titulo);
    
    dragSource = null;
    renderLista();
    salvarProgresso();
}

function excluirItem(titulo, index) {
    if(confirm("Excluir item?")) {
        dados.get(titulo).splice(index, 1);
        if(dados.get(titulo).length === 0) dados.delete(titulo);
        renderLista();
        salvarProgresso();
    }
}

function abrirModal(titulo, index) {
    const item = dados.get(titulo)[index];
    document.getElementById("editDesc").value = item.descricao;
    document.getElementById("editSubs").value = item.subdescricoes.join(', ');
    document.getElementById("modalEdicao").style.display = "flex";
    document.getElementById("btnSalvarModal").onclick = () => {
        item.descricao = document.getElementById("editDesc").value;
        item.subdescricoes = document.getElementById("editSubs").value.split(',').map(x => x.trim()).filter(x => x);
        renderLista();
        salvarProgresso();
        fecharModal();
    };
}

function fecharModal() { document.getElementById("modalEdicao").style.display = "none"; }

function gerarTexto() {
    let dataVal = document.getElementById("data").value;
    if (!dataVal) return alert("Selecione a data");
    let p = dataVal.split("-");
    let texto = `**Relato - ${p[2]}/${p[1]}/${p[0]}**\n\n`;
    dados.forEach((itens, titulo) => {
        texto += `**${titulo}**\n`;
        itens.forEach(i => {
            texto += ` - ${i.descricao}\n`;
            i.subdescricoes.forEach(s => texto += `   - ${s}\n`);
        });
        texto += "\n";
    });
    document.getElementById("resultado").textContent = texto;

    // Limpa o estado interno e a interface após gerar o texto
    dados.clear();
    subdescricoesTemporarias = [];
    document.getElementById("titulo").value = "";
    document.getElementById("descricao").value = "";
    document.getElementById("subInput").value = "";
    renderLista();
    renderTags();
    limparProgresso();
}

function limparTudo() {
    if (confirm("Tem certeza que deseja limpar todo o formulário e a lista de itens?")) {
        dados.clear();
        subdescricoesTemporarias = [];
        document.getElementById("titulo").value = "";
        document.getElementById("descricao").value = "";
        document.getElementById("subInput").value = "";
        document.getElementById("resultado").textContent = "";
        renderLista();
        renderTags();
        limparProgresso();
    }
}

function mudarCorTema(c) { document.documentElement.style.setProperty('--primary-color', c); localStorage.setItem('temaCor', c); }
function toggleNightMode() { 
    document.body.classList.toggle('dark-mode'); 
    localStorage.setItem('nightMode', document.body.classList.contains('dark-mode') ? 'ativo' : 'inativo'); 
}
function copiarTexto() { navigator.clipboard.writeText(document.getElementById("resultado").textContent); alert("Copiado!"); }

window.onload = function() { 
    document.getElementById("data").value = new Date().toLocaleDateString('sv-SE', {timeZone: 'America/Sao_Paulo'}); 
    mudarCorTema(localStorage.getItem('temaCor') || '#007bff'); 
    if(localStorage.getItem('nightMode') === 'ativo') document.body.classList.add('dark-mode');
    carregarProgresso();
}
</script>
</body>
</html>
