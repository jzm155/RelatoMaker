<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Relato</title>

<style>
:root {
    --bg-body: #f4f6f8;
    --bg-container: white;
    --text-color: #333;
    --item-bg: #f1f1f1;
    --border-color: #ccc;
    --group-bg: #fafafa;
    --primary-color: #007bff;
}

body.dark-mode {
    --bg-body: #121212;
    --bg-container: #1e1e1e;
    --text-color: #e0e0e0;
    --item-bg: #2d2d2d;
    --border-color: #444;
    --group-bg: #252525;
}

body {
    font-family: Arial;
    background: var(--bg-body);
    color: var(--text-color);
    padding: 40px 20px;
    margin: 0;
    transition: 0.3s;
}

.container {
    max-width: 800px;
    margin: auto;
    background: var(--bg-container);
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.controles-topo {
    position: fixed;
    top: 15px;
    right: 15px;
    display: flex;
    gap: 10px;
    align-items: center;
    z-index: 1000;
}

#btnNightMode {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    border: 1px solid var(--border-color);
    background: var(--bg-container);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
}

.seletor-cor {
    width: 30px;
    height: 30px;
    padding: 0;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    overflow: hidden;
}

.grupo-adicao {
    border: 1px solid var(--border-color);
    padding: 15px;
    border-radius: 8px;
    background: var(--group-bg);
    margin-bottom: 20px;
}

.titulo-container {
    margin-bottom: 15px;
    padding-bottom: 15px;
    border-bottom: 1px dashed var(--border-color);
}

.grupo-inputs {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.linha-input {
    display: flex;
    gap: 10px;
    align-items: flex-end;
}

.flex-item { flex: 1; }

input {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    border: 1px solid var(--border-color);
    border-radius: 5px;
    background: var(--bg-container);
    color: var(--text-color);
    box-sizing: border-box;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: var(--primary-color);
    color: white;
    font-weight: bold;
    transition: filter 0.2s;
}

button:hover { filter: brightness(0.9); }

.item {
    background: var(--item-bg);
    padding: 12px;
    border-radius: 6px;
    margin-bottom: 10px;
    border-left: 4px solid var(--primary-color);
}

/* Modal */
.modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 2000;
    align-items: center;
    justify-content: center;
}

.modal-content {
    background: var(--bg-container);
    padding: 25px;
    border-radius: 12px;
    width: 90%;
    max-width: 500px;
    border: 1px solid var(--border-color);
}

.tag-sub {
    display: inline-flex;
    align-items: center;
    background: var(--primary-color);
    color: white;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    margin: 2px;
}

.tag-sub span { cursor: pointer; margin-left: 5px; }

.btn-acoes {
    display: flex;
    gap: 5px;
}

.btn-delete { background: #dc3545; padding: 4px 8px; font-size: 12px; }
.btn-edit { background: #6c757d; padding: 4px 8px; font-size: 12px; }

.output {
    margin-top: 10px;
    background: #111;
    color: #0f0;
    padding: 15px;
    border-radius: 8px;
    white-space: pre-wrap;
    font-family: monospace;
    min-height: 50px;
}

@media (max-width: 600px) {
    .linha-input { flex-direction: column; align-items: stretch; }
}
</style>
</head>

<body>

<div class="modal-overlay" id="modalEdicao">
    <div class="modal-content">
        <h3 style="margin-top:0">Editar Item</h3>
        <label>Descrição Principal</label>
        <input type="text" id="editDesc">
        <div style="margin-top:15px">
            <label>Subdescrições (separadas por vírgula)</label>
            <input type="text" id="editSubs">
        </div>
        <div style="display:flex; gap:10px; margin-top:20px">
            <button style="background:#6c757d; flex:1" onclick="fecharModal()">Cancelar</button>
            <button style="flex:2" id="btnSalvarModal">Salvar</button>
        </div>
    </div>
</div>

<div class="controles-topo">
    <input type="color" id="corTema" class="seletor-cor" onchange="mudarCorTema(this.value)">
    <button id="btnNightMode" onclick="toggleNightMode()">🌓</button>
</div>

<div class="container">
    <h2>Gerador de Relato</h2>

    <label>Data</label>
    <input type="date" id="data" style="margin-bottom: 15px;">

    <div class="grupo-adicao">
        <div class="titulo-container">
            <label>Título da Seção</label>
            <input type="text" id="titulo" placeholder="Ex: Atividades do Dia">
        </div>

        <div class="grupo-inputs">
            <div class="linha-input">
                <div class="flex-item">
                    <label>Descrição</label>
                    <input type="text" id="descricao">
                </div>
            </div>
            <div class="linha-input">
                <div class="flex-item">
                    <label>Sub descrição</label>
                    <input type="text" id="subInput" placeholder="Enter para adicionar">
                </div>
                <button type="button" onclick="addTag()">+</button>
            </div>
            <div id="containerTags"></div>
            <button onclick="adicionarItem()" style="width:100%; margin-top:10px">Adicionar à Lista</button>
        </div>
    </div>

    <div style="margin-top:20px">
        <h3>Itens adicionados</h3>
        <div id="lista"></div>
    </div>

    <button onclick="gerarTexto()" style="width:100%; margin: 20px 0;">Gerar Texto Final</button>

    <div style="margin-top:30px; display:flex; justify-content: space-between; align-items:center">
        <h3 style="margin:0">Resultado</h3>
        <button onclick="copiarTexto()" style="font-size:12px">Copiar</button>
    </div>
    <div class="output" id="resultado"></div>
</div>

<script>
let dados = {};
let subdescricoesTemporarias = [];
let editandoInfo = { titulo: "", index: -1 };

document.getElementById('subInput').addEventListener('keydown', e => { if(e.key === 'Enter') { e.preventDefault(); addTag(); }});

function addTag() {
    let val = document.getElementById('subInput').value.trim();
    if (val) { subdescricoesTemporarias.push(val); renderTags(); }
    document.getElementById('subInput').value = "";
}

function renderTags() {
    document.getElementById('containerTags').innerHTML = subdescricoesTemporarias.map((s, i) => 
        `<span class="tag-sub">${s} <span onclick="removeTag(${i})">&times;</span></span>`
    ).join('');
}

function removeTag(i) { subdescricoesTemporarias.splice(i, 1); renderTags(); }

function adicionarItem() {
    let titulo = document.getElementById("titulo").value;
    let descricao = document.getElementById("descricao").value;
    if (!titulo || !descricao) return;
    if (!dados[titulo]) dados[titulo] = [];
    dados[titulo].push({ descricao, subdescricoes: [...subdescricoesTemporarias] });
    subdescricoesTemporarias = [];
    renderTags();
    document.getElementById("descricao").value = "";
    renderLista();
}

function excluirItem(titulo, index) {
    if(confirm("Excluir este item?")) {
        dados[titulo].splice(index, 1);
        if(dados[titulo].length === 0) delete dados[titulo];
        renderLista();
    }
}

function renderLista() {
    let html = "";
    for (let titulo in dados) {
        html += `<div class="item"><b>${titulo}</b>`;
        dados[titulo].forEach((i, index) => {
            html += `<div style="margin-top:8px; display:flex; justify-content:space-between; align-items:flex-start">
                <div style="flex:1">
                    - ${i.descricao}
                    ${i.subdescricoes.map(s => `<div style="margin-left:20px; font-size:0.9em; opacity:0.8">↳ ${s}</div>`).join('')}
                </div>
                <div class="btn-acoes">
                    <button class="btn-edit" onclick="abrirModal('${titulo}', ${index})">✎</button>
                    <button class="btn-delete" onclick="excluirItem('${titulo}', ${index})">🗑</button>
                </div>
            </div>`;
        });
        html += `</div>`;
    }
    document.getElementById("lista").innerHTML = html;
}

function abrirModal(titulo, index) {
    editandoInfo = { titulo, index };
    const item = dados[titulo][index];
    document.getElementById("editDesc").value = item.descricao;
    document.getElementById("editSubs").value = item.subdescricoes.join(', ');
    document.getElementById("modalEdicao").style.display = "flex";
    document.getElementById("btnSalvarModal").onclick = salvarEdicao;
}

function fecharModal() { document.getElementById("modalEdicao").style.display = "none"; }

function salvarEdicao() {
    const d = document.getElementById("editDesc").value;
    const s = document.getElementById("editSubs").value;
    if (d) {
        dados[editandoInfo.titulo][editandoInfo.index].descricao = d;
        dados[editandoInfo.titulo][editandoInfo.index].subdescricoes = s.split(',').map(x => x.trim()).filter(x => x);
        renderLista();
        fecharModal();
    }
}

function gerarTexto() {
    let data = document.getElementById("data").value;
    if (!data) return;
    let p = data.split("-");
    let texto = `**Relato - ${p[2]}/${p[1]}/${p[0]}**\n\n`;
    for (let t in dados) {
        texto += `**${t}**\n`;
        dados[t].forEach(i => {
            texto += ` - ${i.descricao}\n`;
            i.subdescricoes.forEach(s => texto += `   - ${s}\n`);
        });
        texto += "\n";
    }
    document.getElementById("resultado").textContent = texto;
}

function mudarCorTema(c) { document.documentElement.style.setProperty('--primary-color', c); localStorage.setItem('temaCor', c); }
function toggleNightMode() { 
    document.body.classList.toggle('dark-mode'); 
    localStorage.setItem('nightMode', document.body.classList.contains('dark-mode') ? 'ativo' : 'inativo'); 
}
function hoje(){ document.getElementById("data").value = new Date().toISOString().split('T')[0]; }
function copiarTexto() { 
    const texto = document.getElementById("resultado").textContent;
    if(!texto) return;
    navigator.clipboard.writeText(texto);
    alert("Copiado!");
}
window.onload = function() { 
    hoje(); 
    mudarCorTema(localStorage.getItem('temaCor') || '#007bff'); 
    if(localStorage.getItem('nightMode') === 'ativo') document.body.classList.add('dark-mode');
}
</script>

</body>
</html>
